name: "Terraform CI/CD - CrediRápido IaC"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write # Requerido para OIDC auth con Azure
  contents: read
  pull-requests: write

env:
  TF_ROOT: './repo-terraform'
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC: "true"

jobs:
  validate-and-plan:
    name: "Validación y Plan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}
    
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v3

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.5.0"

      # Lint y chequeo de seguridad
      - name: "Terraform Format (Lint)"
        run: terraform fmt -check

      - name: "Security Scan (tfsec)"
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.TF_ROOT }}

      # Inicialización y validación
      - name: "Terraform Init"
        run: terraform init

      - name: "Terraform Validate"
        run: terraform validate

      # Generar Plan
      - name: "Terraform Plan"
        id: plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_db_admin_password: ${{ secrets.DB_ADMIN_PASSWORD }}

      # Comentar en la PR el Plan generado
      - name: "Post Plan to PR"
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const output = `#### Terraform Plan 📝
            <details><summary>Click to expand</summary>
            
            \`\`\`terraform\n
            Plan generated successfully
            \`\`\`
            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  deploy:
    name: "Despliegue a Producción"
    runs-on: ubuntu-latest
    needs: validate-and-plan
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: production
      url: 'https://ca-credito-api.azurecontainerapps.io'
    
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}
        
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v3

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.5.0"

      - name: "Terraform Init"
        run: terraform init

      - name: "Terraform Apply"
        run: terraform apply -auto-approve
        env:
          TF_VAR_db_admin_password: ${{ secrets.DB_ADMIN_PASSWORD }}
